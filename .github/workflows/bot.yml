name: "Automated Registry Bot"

on:
  schedule:
    # Run once a week on Sunday at midnight
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  generate-snapshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Run Snapshot Generation Action
        uses: ./
        with:
          frameworks: "torch,jax,tensorflow,keras,mlx,flax"
          out-dir: "./snapshots"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update ML framework snapshots"
          title: "Automated Snapshot Update"
          body: |
            ## Automated Snapshot Update

            This PR was automatically generated by the Snapshot Registry Bot.
            It contains updated JSON API snapshots for the latest versions of the configured ML frameworks.
          branch: "bot/update-snapshots"
          base: "main"
          labels: "automated pr, snapshots"
